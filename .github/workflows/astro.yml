name: Deploy Astro site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # 暴力清除本地可能冲突的旧锁文件，直接全新安装
      - name: Clean and Install
        run: |
          rm -f pnpm-lock.yaml
          pnpm config set ignore-scripts false
          pnpm install
        env:
          PNPM_CONFIG_IGNORE_SCRIPTS: "false"
          NPM_CONFIG_IGNORE_SCRIPTS: "false"

      # 手动写死打包，不再让 GitHub 插件注入环境变量。
      # 注意：如果你的 GitHub Pages 是子路径（比如 username.github.io/repo/），请把 --base 改为 "/repo/"
      - name: Build with Astro
        run: pnpm astro build --site "https://${{ github.repository_owner }}.github.io" --base "/${{ github.event.repository.name }}"

      # 直接上传 dist 目录，不使用任何带有检测功能的 Setup 插件
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
