name: Deploy Astro site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progres: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # 注意：这里故意不传 cache: "pnpm"，切断 pnpm 插件的无形控制

      # 绕过 pnpm，直接用 npm 暴力安装，npm 默认对原生脚本完全放行
      - name: Clean and Install with NPM
        run: |
          npm install --legacy-peer-deps
        working-directory: "."

      - name: Build with Astro
        run: |
          npx astro build \
            --site "https://${{ github.repository_owner }}.github.io" \
            --base "/${{ github.event.repository.name }}"
        working-directory: "."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
